<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Угадай футболиста по карьере</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0e1420; --panel: #141c2b; --row: #182236; --row2: #141c2b;
  --text: #e8edf5; --muted: #8494ab; --accent: #00a86b; --gold: #ffc24b;
  --red: #e05656; --border: #223049;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, "Segoe UI", Roboto, sans-serif; min-height: 100vh; padding-bottom: 30px; }
.top { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--panel); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
.top .title { font-weight: 700; font-size: 15px; }
.stats { display: flex; gap: 10px; font-size: 14px; font-weight: 700; }
.coin { color: var(--gold); } .fire { color: #ff8c42; }
.wrap { max-width: 560px; margin: 0 auto; padding: 12px; }
.career { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
.career .head { display: grid; grid-template-columns: 92px 1fr 44px 44px; padding: 8px 12px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
.crow { display: grid; grid-template-columns: 92px 1fr 44px 44px; padding: 10px 12px; font-size: 13px; align-items: center; }
.crow:nth-child(odd) { background: var(--row); }
.crow .season { color: var(--muted); font-size: 12px; }
.crow .club b { display: block; font-size: 13px; }
.crow .club span { color: var(--muted); font-size: 11px; }
.crow .num { text-align: center; font-weight: 600; }
.crow .goals { color: #6fc2ff; }
.name-boxes { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 16px 0 6px; }
.lbox { width: 30px; height: 38px; border-radius: 7px; background: var(--row); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; cursor: pointer; user-select: none; }
.lbox.open { background: #1d3a2c; border-color: var(--accent); cursor: default; }
.lbox.space { width: 12px; background: transparent; border: none; cursor: default; }
.hint-cost { text-align: center; color: var(--muted); font-size: 12px; margin-bottom: 12px; }
.hint-cost b { color: var(--gold); }
.guess-row { display: flex; gap: 8px; margin-bottom: 10px; }
#guess { flex: 1; padding: 12px 14px; font-size: 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel); color: var(--text); outline: none; }
#guess:focus { border-color: var(--accent); }
button { border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; padding: 12px 16px; }
.btn-check { background: var(--accent); color: #fff; }
.btn-give { background: var(--row); color: var(--muted); width: 100%; margin-top: 6px; font-size: 13px; padding: 10px; }
.btn-next { background: var(--gold); color: #201500; width: 100%; margin-top: 10px; display: none; }
.feedback { text-align: center; min-height: 22px; font-size: 14px; font-weight: 600; margin: 8px 0; }
.feedback.ok { color: var(--accent); } .feedback.bad { color: var(--red); } .feedback.close { color: var(--gold); }
.toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 26px; background: #1d2a40; border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 12px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 10; }
.toast.show { opacity: 1; }
.progress { text-align: center; color: var(--muted); font-size: 12px; margin-top: 14px; }
</style>
</head>
<body>
<div class="top">
  <div class="title">⚽ Угадай по карьере</div>
  <div class="stats"><span class="coin">🪙 <span id="coins">0</span></span><span class="fire">🔥 <span id="streak">0</span></span></div>
</div>
<div class="wrap">
  <div class="career">
    <div class="head"><span>Сезон</span><span>Команда</span><span>🏟</span><span>⚽</span></div>
    <div id="rows"></div>
  </div>
  <div class="name-boxes" id="boxes"></div>
  <div class="hint-cost" id="hintCost"></div>
  <div class="guess-row">
    <input id="guess" type="text" placeholder="Фамилия игрока…" autocomplete="off">
    <button class="btn-check" id="checkBtn">✓</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <button class="btn-next" id="nextBtn">Следующий игрок ➜</button>
  <button class="btn-give" id="giveBtn">Сдаться (серия сгорит)</button>
  <div class="progress" id="progress"></div>
</div>
<div class="toast" id="toast"></div>

<script src="players.js"></script>
<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ---------- хранилище (Telegram CloudStorage + localStorage) ----------
const store = {
  get(k, def) { try { const v = localStorage.getItem(k); return v === null ? def : JSON.parse(v); } catch (e) { return def; } },
  set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {}
    if (tg && tg.CloudStorage) { try { tg.CloudStorage.setItem(k, JSON.stringify(v), () => {}); } catch (e) {} }
  }
};

let coins = store.get('coins', 100);
let winStreak = store.get('winStreak', 0);
let solved = store.get('solved', []);
let openedIdx = [];
let cur = null;
let finished = false;

// ---------- ежедневный бонус ----------
(function daily() {
  const today = new Date().toDateString();
  const last = store.get('lastDay', '');
  if (last === today) return;
  const yesterday = new Date(Date.now() - 864e5).toDateString();
  let days = store.get('dayStreak', 0);
  days = (last === yesterday) ? days + 1 : 1;
  const bonus = 50 + Math.min((days - 1) * 10, 50);
  coins += bonus;
  store.set('dayStreak', days); store.set('lastDay', today); store.set('coins', coins);
  setTimeout(() => toast(`🎁 Ежедневный бонус: +${bonus} монет (день ${days})`), 600);
})();

// ---------- нечёткое сравнение ----------
function normRu(s) {
  return s.toLowerCase().replace(/ё/g, 'е').replace(/й/g, 'и').replace(/[^а-яе]/g, '');
}
function normEn(s) {
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/ø/g, 'o').replace(/[^a-z]/g, '');
}
function lev(a, b) {
  if (Math.abs(a.length - b.length) > 5) return 99;
  const m = a.length, n = b.length;
  let prev = Array.from({length: n + 1}, (_, j) => j);
  for (let i = 1; i <= m; i++) {
    const row = [i];
    for (let j = 1; j <= n; j++) {
      row[j] = Math.min(prev[j] + 1, row[j - 1] + 1, prev[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
    }
    prev = row;
  }
  return prev[n];
}
function threshold(len) { return len <= 4 ? 1 : len <= 7 ? 2 : len <= 10 ? 3 : 4; }
function lastWord(s) { const p = s.trim().split(/\s+/); return p[p.length - 1]; }

// вернёт: 2 = принято, 1 = почти, 0 = мимо
function checkGuess(guess, p) {
  const isLatin = /[a-z]/i.test(guess) && !/[а-я]/i.test(guess);
  const cands = [];
  if (isLatin) {
    const g = normEn(guess);
    [p.en, lastWord(p.en)].forEach(c => cands.push([g, normEn(c)]));
  } else {
    const g = normRu(guess);
    [p.n, lastWord(p.n), ...(p.alt || []), ...(p.alt || []).map(lastWord)].forEach(c => cands.push([g, normRu(c)]));
  }
  let best = 99, bestLen = 1;
  for (const [g, c] of cands) {
    if (!c) continue;
    const d = lev(g, c);
    if (d - threshold(c.length) < best - threshold(bestLen)) { best = d; bestLen = c.length; }
  }
  if (best <= threshold(bestLen)) return 2;
  if (best <= threshold(bestLen) + 1) return 1;
  return 0;
}

// ---------- игра ----------
function pick() {
  const pool = PLAYERS.map((_, i) => i).filter(i => !solved.includes(i));
  if (!pool.length) { solved = []; store.set('solved', []); return pick(); }
  return pool[Math.floor(Math.random() * pool.length)];
}

function render() {
  const p = PLAYERS[cur];
  document.getElementById('rows').innerHTML = p.c.map(r =>
    `<div class="crow"><span class="season">${r[0]}</span><span class="club"><b>${r[1]}</b><span>${r[2]}</span></span><span class="num">${r[3]}</span><span class="num goals">${r[4]}</span></div>`
  ).join('');
  renderBoxes();
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('guess').value = '';
  document.getElementById('guess').disabled = false;
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('giveBtn').style.display = 'block';
  document.getElementById('progress').textContent = `Отгадано: ${solved.length} из ${PLAYERS.length}`;
  updateStats();
}

function letterCost() { return 5 * Math.pow(2, openedIdx.length); }

function renderBoxes() {
  const name = PLAYERS[cur].n;
  const el = document.getElementById('boxes');
  el.innerHTML = '';
  [...name].forEach((ch, i) => {
    const d = document.createElement('div');
    if (ch === ' ' || ch === '-') { d.className = 'lbox space'; }
    else if (openedIdx.includes(i) || finished) { d.className = 'lbox open'; d.textContent = ch.toUpperCase(); }
    else {
      d.className = 'lbox';
      d.onclick = () => buyLetter(i);
    }
    el.appendChild(d);
  });
  document.getElementById('hintCost').innerHTML = finished ? '' :
    `Нажми на клетку, чтобы открыть букву — <b>🪙 ${letterCost()}</b>`;
}

function buyLetter(i) {
  const cost = letterCost();
  if (coins < cost) { toast('Не хватает монет 😕 Заходи завтра за бонусом!'); return; }
  const doIt = () => {
    coins -= cost; openedIdx.push(i);
    store.set('coins', coins);
    renderBoxes(); updateStats();
  };
  if (tg && tg.showConfirm) tg.showConfirm(`Открыть букву за ${cost} монет?`, ok => ok && doIt());
  else if (confirm(`Открыть букву за ${cost} монет?`)) doIt();
}

function check() {
  if (finished) return;
  const guess = document.getElementById('guess').value.trim();
  if (!guess) return;
  const res = checkGuess(guess, PLAYERS[cur]);
  const fb = document.getElementById('feedback');
  if (res === 2) {
    winStreak++;
    const reward = 30 + Math.min(winStreak * 5, 25);
    coins += reward;
    solved.push(cur);
    store.set('coins', coins); store.set('solved', solved); store.set('winStreak', winStreak);
    finished = true;
    fb.className = 'feedback ok';
    fb.textContent = `✅ Верно! Это ${PLAYERS[cur].full} · +${reward} 🪙`;
    endRound();
    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  } else if (res === 1) {
    fb.className = 'feedback close';
    fb.textContent = '🔶 Очень близко! Проверь написание';
  } else {
    fb.className = 'feedback bad';
    fb.textContent = '❌ Мимо, попробуй ещё';
    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
  }
  updateStats();
}

function giveUp() {
  if (finished) return;
  winStreak = 0; store.set('winStreak', 0);
  finished = true;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback bad';
  fb.textContent = `Это был ${PLAYERS[cur].full}`;
  solved.push(cur); store.set('solved', solved);
  endRound(); updateStats();
}

function endRound() {
  renderBoxes();
  document.getElementById('guess').disabled = true;
  document.getElementById('checkBtn').disabled = true;
  document.getElementById('giveBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('progress').textContent = `Отгадано: ${solved.length} из ${PLAYERS.length}`;
}

function next() { cur = pick(); openedIdx = []; finished = false; render(); }

function updateStats() {
  document.getElementById('coins').textContent = coins;
  document.getElementById('streak').textContent = winStreak;
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

document.getElementById('checkBtn').onclick = check;
document.getElementById('guess').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
document.getElementById('nextBtn').onclick = next;
document.getElementById('giveBtn').onclick = () => {
  if (tg && tg.showConfirm) tg.showConfirm('Сдаться? Серия побед сгорит.', ok => ok && giveUp());
  else if (confirm('Сдаться? Серия побед сгорит.')) giveUp();
};

window.__check = checkGuess; // для отладки
next();
</script>
</body>
</html>
